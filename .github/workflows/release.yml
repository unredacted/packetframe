name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_STABLE: "1.95.0"
  RUST_NIGHTLY: "nightly-2026-04-14"
  BPF_LINKER_VERSION: "0.10.3"

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable + nightly for BPF + target)
        run: |
          rustup toolchain install ${{ env.RUST_STABLE }} --profile minimal
          rustup default ${{ env.RUST_STABLE }}
          rustup target add ${{ matrix.target }}
          rustup toolchain install ${{ env.RUST_NIGHTLY }} \
            --profile minimal --component rust-src,llvm-tools-preview

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            crates/modules/fast-path/bpf/target/
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock', 'crates/modules/fast-path/bpf/Cargo.toml') }}

      - name: Install bpf-linker
        run: |
          if ! command -v bpf-linker >/dev/null 2>&1 || \
             [ "$(bpf-linker --version 2>/dev/null | awk '{print $2}')" != "${{ env.BPF_LINKER_VERSION }}" ]; then
            cargo install --locked --force bpf-linker \
              --version ${{ env.BPF_LINKER_VERSION }}
          fi

      - name: Install cross
        run: |
          if ! command -v cross >/dev/null 2>&1; then
            cargo install --locked cross
          fi

      - name: Build release
        run: cross build --release --workspace --target ${{ matrix.target }}

      - name: Stage tarball contents
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          STEM="packetframe-${VERSION}-${{ matrix.target }}"
          STAGE="dist/${STEM}"
          mkdir -p "${STAGE}/conf"
          cp "target/${{ matrix.target }}/release/packetframe" "${STAGE}/"
          cp conf/example.conf "${STAGE}/conf/"
          cp LICENSE README.md VERSION "${STAGE}/"
          ( cd dist && tar czf "${STEM}.tar.gz" "${STEM}" )
          ( cd dist && sha256sum "${STEM}.tar.gz" > "${STEM}.tar.gz.sha256" )

      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 7
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Combine SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          cat *.sha256 > SHA256SUMS
          rm -f *.sha256

      - name: Import GPG signing key
        if: ${{ env.PACKETFRAME_GPG_KEY != '' }}
        env:
          PACKETFRAME_GPG_KEY: ${{ secrets.PACKETFRAME_GPG_KEY }}
        run: |
          echo "${PACKETFRAME_GPG_KEY}" | gpg --batch --import

      - name: Sign SHA256SUMS
        if: ${{ env.PACKETFRAME_GPG_KEY != '' }}
        env:
          PACKETFRAME_GPG_KEY: ${{ secrets.PACKETFRAME_GPG_KEY }}
          PACKETFRAME_GPG_KEY_ID: ${{ secrets.PACKETFRAME_GPG_KEY_ID }}
        run: |
          cd dist
          gpg --batch --yes --detach-sign --armor \
            --local-user "${PACKETFRAME_GPG_KEY_ID}" \
            --output SHA256SUMS.asc \
            SHA256SUMS

      - name: Create GitHub release
        # `gh release create` ships with the runner's `gh` CLI — first-party
        # GitHub tooling, no third-party action needed.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          FILES=(dist/*.tar.gz dist/SHA256SUMS)
          if [[ -f dist/SHA256SUMS.asc ]]; then
            FILES+=(dist/SHA256SUMS.asc)
          fi
          gh release create "${GITHUB_REF_NAME}" \
            ${PRERELEASE_FLAG} \
            --generate-notes \
            --title "${GITHUB_REF_NAME}" \
            "${FILES[@]}"
