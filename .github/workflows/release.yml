name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual trigger for pre-release validation — runs the BPF + cross
  # build matrix but skips publishing. Use to confirm release tarballs
  # would ship a real BPF ELF before cutting a tag.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip the publish step (no GitHub release created)'
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  RUST_STABLE: "1.95.0"
  RUST_NIGHTLY: "nightly-2026-04-14"
  BPF_LINKER_VERSION: "0.10.3"

jobs:
  # Build the BPF ELF once on the host runner (rustup + nightly + bpf-linker
  # all available here). Every cross-build job downloads this artifact and
  # embeds it via PACKETFRAME_BPF_OBJ_PATH — cross's Docker images have no
  # rustup so they cannot nest-build BPF themselves (prior release flow
  # shipped a stub ELF and every attach silently failed).
  bpf:
    name: build BPF ELF
    runs-on: ubuntu-latest
    env:
      PACKETFRAME_BPF_REQUIRED: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable + nightly for BPF)
        run: |
          rustup toolchain install ${{ env.RUST_STABLE }} --profile minimal
          rustup default ${{ env.RUST_STABLE }}
          rustup toolchain install ${{ env.RUST_NIGHTLY }} \
            --profile minimal --component rust-src,llvm-tools-preview

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            crates/modules/fast-path/bpf/target/
            crates/modules/probe/bpf/target/
          key: ${{ runner.os }}-release-bpf-${{ hashFiles('crates/modules/fast-path/bpf/**', 'crates/modules/probe/bpf/**') }}

      - name: Install bpf-linker
        run: |
          if ! command -v bpf-linker >/dev/null 2>&1 || \
             [ "$(bpf-linker --version 2>/dev/null | awk '{print $2}')" != "${{ env.BPF_LINKER_VERSION }}" ]; then
            cargo install --locked --force bpf-linker \
              --version ${{ env.BPF_LINKER_VERSION }}
          fi

      - name: Build BPF ELFs
        run: |
          set -eux
          build_one() {
            local bpf_dir="$1"
            local bin_name="$2"
            local out_name="$3"
            ( cd "${bpf_dir}" && cargo build --release --message-format=json ) \
              | tee "${out_name}.json" >/dev/null
            local elf
            elf=$(python3 -c "
          import json, sys
          for line in open('${out_name}.json'):
              try:
                  msg = json.loads(line)
              except Exception:
                  continue
              if msg.get('reason') == 'compiler-artifact' and msg.get('target', {}).get('name') == '${bin_name}':
                  print(msg['filenames'][0])
                  sys.exit(0)
          sys.exit(1)
          ")
            test -n "${elf}" && test -e "${elf}"
            # Verify ELF magic so we fail-loud if the build regressed to a stub.
            head -c 4 "${elf}" | od -An -c | grep -q 'E   L   F' || \
              (echo "BPF output is not an ELF at ${elf}" >&2; exit 1)
            cp "${elf}" "dist/${out_name}"
          }
          mkdir -p dist
          build_one crates/modules/fast-path/bpf fast-path fast-path.bpf.o
          build_one crates/modules/probe/bpf     probe     probe.bpf.o
          ls -la dist/*.bpf.o

      - uses: actions/upload-artifact@v7
        with:
          name: bpf-elf
          path: |
            dist/fast-path.bpf.o
            dist/probe.bpf.o
          retention-days: 7
          if-no-files-found: error

  build:
    name: build ${{ matrix.target }}
    needs: bpf
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
        with:
          # `git log -1 --pretty=%ct <ref>` below needs the tagged commit
          # in history. Default fetch-depth=1 is fine for tag pushes (the
          # tag *is* the checked-out commit) but workflow_dispatch on a
          # branch needs more history to resolve the ref.
          fetch-depth: 0

      # Reproducibility: derive SOURCE_DATE_EPOCH from the tag commit so
      # both rustc-embedded timestamps and the .deb archive's file mtimes
      # are deterministic. Same value across all matrix legs ensures the
      # binary contents (and the .deb wrapping it) match across runners.
      - name: Set SOURCE_DATE_EPOCH from tag commit
        run: |
          set -euo pipefail
          SDE=$(git log -1 --pretty=%ct "${GITHUB_REF_NAME}")
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "${GITHUB_ENV}"

      - name: Install Rust (stable + target)
        run: |
          rustup toolchain install ${{ env.RUST_STABLE }} --profile minimal
          rustup default ${{ env.RUST_STABLE }}
          rustup target add ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        run: |
          if ! command -v cross >/dev/null 2>&1; then
            cargo install --locked cross
          fi

      - uses: actions/download-artifact@v8
        with:
          name: bpf-elf
          path: prebuilt-bpf

      - name: Prepare BPF ELF paths for build.rs
        run: |
          set -eux
          FAST="$(pwd)/prebuilt-bpf/fast-path.bpf.o"
          PROBE="$(pwd)/prebuilt-bpf/probe.bpf.o"
          test -e "${FAST}" && test -e "${PROBE}"
          head -c 4 "${FAST}"  | od -An -c | grep -q 'E   L   F'
          head -c 4 "${PROBE}" | od -An -c | grep -q 'E   L   F'
          # Cross runs inside Docker, so use the container's mounted
          # project path (`/project`) for the env vars. Cross mounts
          # the workspace root there by default.
          {
            echo "PACKETFRAME_BPF_OBJ_PATH=/project/prebuilt-bpf/fast-path.bpf.o"
            echo "PACKETFRAME_PROBE_BPF_OBJ_PATH=/project/prebuilt-bpf/probe.bpf.o"
          } >> "${GITHUB_ENV}"
          # Forward env vars into the container. SOURCE_DATE_EPOCH is also
          # forwarded so rustc-embedded timestamps inside the cross build
          # match the tag commit time set in GITHUB_ENV earlier.
          echo "CROSS_CONTAINER_OPTS=-e PACKETFRAME_BPF_OBJ_PATH=/project/prebuilt-bpf/fast-path.bpf.o -e PACKETFRAME_PROBE_BPF_OBJ_PATH=/project/prebuilt-bpf/probe.bpf.o -e SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}" >> "${GITHUB_ENV}"

      - name: Build release
        run: cross build --release --workspace --target ${{ matrix.target }}

      - name: Stage tarball contents
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          STEM="packetframe-${VERSION}-${{ matrix.target }}"
          STAGE="dist/${STEM}"
          mkdir -p "${STAGE}/conf"
          cp "target/${{ matrix.target }}/release/packetframe" "${STAGE}/"
          cp conf/example.conf "${STAGE}/conf/"
          cp LICENSE README.md VERSION "${STAGE}/"
          ( cd dist && tar czf "${STEM}.tar.gz" "${STEM}" )
          ( cd dist && sha256sum "${STEM}.tar.gz" > "${STEM}.tar.gz.sha256" )

      # cargo-deb runs only for the gnu targets — .deb is for glibc-based
      # Debian-family distros, and the existing musl tarballs cover the
      # static-binary use case. Pinned version: bump deliberately.
      - name: Install cargo-deb
        if: contains(matrix.target, '-gnu')
        run: |
          if ! command -v cargo-deb >/dev/null 2>&1 || \
             [ "$(cargo deb --version 2>/dev/null | awk '{print $2}')" != "2.7.0" ]; then
            cargo install --locked --force cargo-deb --version 2.7.0
          fi

      - name: Build .deb
        if: contains(matrix.target, '-gnu')
        run: |
          set -euo pipefail
          # Strip the leading `v` so the .deb version is plain semver (e.g.
          # 0.2.2), matching what `dpkg -s packetframe` will report.
          DEB_VERSION="${GITHUB_REF_NAME#v}"
          STEM="packetframe-${GITHUB_REF_NAME}-${{ matrix.target }}"
          # SOURCE_DATE_EPOCH is already in GITHUB_ENV from the earlier
          # step; cargo-deb honors it for archive mtimes and the
          # changelog Date field. --no-build because cross already
          # produced the binary at target/<triple>/release/packetframe.
          # --no-strip because the workspace release profile already
          # stripped, and the host's `strip` can't read a cross-built
          # arm64 ELF anyway.
          cargo deb --no-build --no-strip \
            --target "${{ matrix.target }}" \
            -p packetframe-cli \
            --deb-version "${DEB_VERSION}" \
            --output dist/
          # Append .deb hash to the per-target .sha256 so the publish
          # job's combined SHA256SUMS picks it up automatically.
          ( cd dist && sha256sum *.deb >> "${STEM}.tar.gz.sha256" )

      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.sha256
          retention-days: 7
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    # Skip publish on workflow_dispatch dry_run so maintainers can validate
    # the bpf + cross-build flow without creating a GitHub release.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Combine SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          cat *.sha256 > SHA256SUMS
          rm -f *.sha256

      - name: Import GPG signing key
        if: ${{ env.PACKETFRAME_GPG_KEY != '' }}
        env:
          PACKETFRAME_GPG_KEY: ${{ secrets.PACKETFRAME_GPG_KEY }}
        run: |
          echo "${PACKETFRAME_GPG_KEY}" | gpg --batch --import

      - name: Sign SHA256SUMS
        if: ${{ env.PACKETFRAME_GPG_KEY != '' }}
        env:
          PACKETFRAME_GPG_KEY: ${{ secrets.PACKETFRAME_GPG_KEY }}
          PACKETFRAME_GPG_KEY_ID: ${{ secrets.PACKETFRAME_GPG_KEY_ID }}
        run: |
          cd dist
          gpg --batch --yes --detach-sign --armor \
            --local-user "${PACKETFRAME_GPG_KEY_ID}" \
            --output SHA256SUMS.asc \
            SHA256SUMS

      - name: Create GitHub release
        # `gh release create` ships with the runner's `gh` CLI — first-party
        # GitHub tooling, no third-party action needed.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          FILES=(dist/*.tar.gz dist/SHA256SUMS)
          if [[ -f dist/SHA256SUMS.asc ]]; then
            FILES+=(dist/SHA256SUMS.asc)
          fi
          gh release create "${GITHUB_REF_NAME}" \
            ${PRERELEASE_FLAG} \
            --generate-notes \
            --title "${GITHUB_REF_NAME}" \
            "${FILES[@]}"
